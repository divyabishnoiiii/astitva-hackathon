<!DOCTYPE html>
<html>
<head>
  <title>Safety Map</title>

  <!-- Google Maps API -->
  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDppVL1vh9NkTlAlORX5eyup_eY3ibbcUs&libraries=visualization"></script>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
    }

    button {
      padding: 10px 15px;
      margin: 10px;
      border: none;
      border-radius: 8px;
      background: #38bdf8;
      cursor: pointer;
    }

    #map {
      height: 500px;
      width: 100%;
      margin-top: 10px;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<h2>My Safety Map</h2>
<p id="status">Status: Safe ✅</p>

<button onclick="sendSOS()">SOS 🚨</button>
<button onclick="showSafe()">Safe Route 🧭</button>
<button onclick="openChat()">Talk 💬</button>
<button onclick="openHousing()">Housing 🏠</button>

<div id="map"></div>

<script>

let map;
let heatmap;
let heatmapData = [];

function initMap() {
  navigator.geolocation.getCurrentPosition((position) => {

    const userLocation = {
      lat: position.coords.latitude,
      lng: position.coords.longitude
    };

    map = new google.maps.Map(document.getElementById("map"), {
      center: userLocation,
      zoom: 14,
      styles: [
        { elementType: "geometry", stylers: [{ color: "#1d2c4d" }] },
        { elementType: "labels.text.fill", stylers: [{ color: "#8ec3b9" }] },
        { elementType: "labels.text.stroke", stylers: [{ color: "#1a3646" }] }
      ]
    });

    // Marker for user
    new google.maps.Marker({
      position: userLocation,
      map: map,
      title: "You are here",
    });

    // Dummy heatmap data
    heatmapData.push(
      new google.maps.LatLng(userLocation.lat + 0.01, userLocation.lng),
      new google.maps.LatLng(userLocation.lat - 0.01, userLocation.lng),
      new google.maps.LatLng(userLocation.lat, userLocation.lng + 0.01)
    );

    heatmap = new google.maps.visualization.HeatmapLayer({
      data: heatmapData,
    });

    heatmap.setMap(map);

  });
}

function sendSOS() {
  document.getElementById("status").innerText = "Status: Unsafe 🚨";

  alert("🚨 SOS ACTIVATED!\nLocation shared with trusted contacts.");
  console.log("Sending alert to NGO...");

  navigator.geolocation.getCurrentPosition((position) => {

    const location = {
      lat: position.coords.latitude,
      lng: position.coords.longitude
    };

    heatmapData.push(
      new google.maps.LatLng(location.lat, location.lng)
    );

    heatmap.setMap(map);

    new google.maps.Marker({
      position: location,
      map: map,
      icon: "http://maps.google.com/mapfiles/ms/icons/red-dot.png"
    });

  });
}

function showSafe() {
  alert("Showing safest nearby routes...");
}

function openChat() {
  alert("Opening AI support chatbot...");
}

function openHousing() {
  window.open("housing.html", "_blank");
}

window.onload = initMap;

</script>

</body>
</html>
