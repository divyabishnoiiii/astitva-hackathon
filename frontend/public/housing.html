<!DOCTYPE html>
<html>
<head>
  <title>Housing Support</title>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    input {
      padding: 10px;
      width: 60%;
      margin-right: 10px;
      border-radius: 8px;
      border: none;
    }

    button {
      padding: 10px 15px;
      border: none;
      border-radius: 8px;
      background: #38bdf8;
      cursor: pointer;
    }

    .card {
      background: #1e293b;
      padding: 15px;
      margin-top: 15px;
      border-radius: 12px;
    }

    .safe {
      color: #22c55e;
    }

    .unsafe {
      color: #ef4444;
    }
  </style>
</head>

<body>

<h1>🏠 Safe Housing Finder</h1>

<input type="text" id="search" placeholder="Enter city..." />
<button onclick="searchHousing()">Search</button>

<div id="results"></div>

<br>
<button onclick="joinCommunity()">Join Community 👥</button>

<script>

  { title: "Room in Chennai", description: "Only families preferred", verified: false, image: "https://images.unsplash.com/photo-1484154218962-a197022b5858" }

];
function detectBias(text) {
  const keywords = ["no outsiders", "only families", "not allowed"];
  return keywords.some(word => text.toLowerCase().includes(word));
}

function searchHousing() {
  const query = document.getElementById("search").value.toLowerCase();
  const resultsDiv = document.getElementById("results");
  resultsDiv.innerHTML = "";

  listings.forEach((item) => {

    if (!item.title.toLowerCase().includes(query)) return;

    const isBiased = detectBias(item.description);

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <img src="${item.image}" style="width:100%; border-radius:10px;" />
      <h3>
  ${item.title} 
  ${item.verified ? "✔️ Verified" : ""}
</h3>
      <p>${item.description}</p>
      <p class="${isBiased ? "unsafe" : "safe"}">
        ${isBiased ? "⚠️ Possibly Biased" : "✅ Safe & Inclusive"}
      </p>
    `;

    resultsDiv.appendChild(div);
  });
}

function joinCommunity() {
  alert("Connecting you to local LGBTQ+ support groups...");
}

</script>

</body>
